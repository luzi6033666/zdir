# 服务端设置
[servers]
port = :6080
RunMode = release

# 存储设置
[storages]
public_path = data/public
public_domain = 

# 目录列表缓存时长（秒）
# 0 = 不缓存（本地高速磁盘默认）
# 30~300 = 推荐用于 rclone / sshfs 等网络挂载盘，可大幅降低延迟
# 注意：开启后，在缓存过期之前，新上传的文件不会立即出现在列表中
# 可通过 /api/cache/clear 接口手动刷新缓存
dir_cache_ttl = 0

# 站点信息设置
[sites]
title = Zdir
name = Zdir

# 用户信息
[users]
username = 
password = 
