name: Build and Release

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Get version from cli/Version.go
        id: version
        run: |
          VERSION=$(grep 'Version = ' cli/Version.go | sed 's/.*"\(.*\)".*/\1/')
          DATE=$(grep 'VersionDate = ' cli/Version.go | sed 's/.*"\(.*\)".*/\1/')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "date=${DATE}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}-${DATE}" >> $GITHUB_OUTPUT

      - name: Build linux/amd64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-w -s" -o zdir .

      - name: Package linux/amd64
        run: |
          tar -zcf zdir_${{ steps.version.outputs.version }}_linux_amd64.tar.gz \
            zdir \
            config.simple.ini \
            templates/ \
            sql/ \
            sh/

      - name: Build linux/arm64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-w -s" -o zdir .

      - name: Package linux/arm64
        run: |
          tar -zcf zdir_${{ steps.version.outputs.version }}_linux_arm64.tar.gz \
            zdir \
            config.simple.ini \
            templates/ \
            sql/ \
            sh/

      - name: Generate changelog
        id: changelog
        run: |
          # 获取上一个同名 tag，没有则取全部历史
          PREV_TAG=$(git tag --sort=-creatordate | grep "^v${{ steps.version.outputs.version }}" | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            # 没有历史 tag，取全部 commit
            LOG=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD)
          fi
          # 写入多行变量
          {
            echo "log<<EOF"
            echo "$LOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Delete existing release if exists
        run: |
          gh release delete ${{ steps.version.outputs.tag }} --yes 2>/dev/null || true
          git push origin :refs/tags/${{ steps.version.outputs.tag }} 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Zdir ${{ steps.version.outputs.version }} (${{ steps.version.outputs.date }})"
          body: |
            ## 更新日志

            ${{ steps.changelog.outputs.log }}

            ## 下载说明

            | 文件 | 适用平台 |
            |------|---------|
            | `zdir_*_linux_amd64.tar.gz` | Linux x86_64（大多数 VPS）|
            | `zdir_*_linux_arm64.tar.gz` | Linux ARM64（如树莓派、部分 NAS）|

            ## 安装 / 更新

            **首次部署：**
            ```bash
            wget https://github.com/luzi6033666/zdir/releases/latest/download/zdir_${{ steps.version.outputs.version }}_linux_amd64.tar.gz
            mkdir -p /opt/zdir && tar -zxf zdir_${{ steps.version.outputs.version }}_linux_amd64.tar.gz -C /opt/zdir/
            cd /opt/zdir && ./zdir init && systemctl start zdir
            ```

            **已有部署一键更新（保留配置和数据）：**
            ```bash
            bash <(curl -fsSL https://raw.githubusercontent.com/luzi6033666/zdir/main/sh/update.sh)
            ```
          files: |
            zdir_${{ steps.version.outputs.version }}_linux_amd64.tar.gz
            zdir_${{ steps.version.outputs.version }}_linux_arm64.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}
